services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gallery
      POSTGRES_USER: gallery
      POSTGRES_PASSWORD: gallery
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gallery -d gallery"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-setup:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/gallery-originals &&
      mc mb --ignore-existing local/gallery-derivatives &&
      mc anonymous set download local/gallery-derivatives
      "

  web:
    image: node:24-bookworm
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://gallery:gallery@db:5432/gallery?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_COOKIE_SECRET: local-development-secret-change-me
      S3_ENDPOINT: http://minio:9000
      S3_REGION: auto
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET_ORIGINALS: gallery-originals
      S3_BUCKET_DERIVATIVES: gallery-derivatives
    volumes:
      - .:/workspace
      - root-node-modules:/workspace/node_modules
      - app-node-modules:/workspace/app/node_modules
    command: >
      /bin/sh -c "
      npm install &&
      npm run db:generate &&
      npm run db:deploy &&
      npm run db:seed &&
      npm run dev --workspace app -- --hostname 0.0.0.0
      "

  worker:
    image: node:24-bookworm
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://gallery:gallery@db:5432/gallery?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: auto
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET_ORIGINALS: gallery-originals
      S3_BUCKET_DERIVATIVES: gallery-derivatives
    volumes:
      - .:/workspace
      - root-node-modules:/workspace/node_modules
      - worker-node-modules:/workspace/worker/node_modules
    command: >
      /bin/sh -c "
      npm install &&
      npm run db:generate &&
      npm run dev --workspace worker
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
  root-node-modules:
  app-node-modules:
  worker-node-modules:
